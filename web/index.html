<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kareto Web</title>

  <link rel="icon" href="favicon.ico">

  <!-- CodeMirror 5 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

  <!-- Brython -->
  <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>


  <link rel="stylesheet" href="style.css" type="text/css" />
</head>

<body>

  <div id="layout">
    
    <div id="editor-panel">
      <div class="panel-header">
        <span>Editor de código</span>
      </div>
      <textarea id="editor"></textarea>
      <button id="run-btn">Executar</button>
    </div>

    <div id="game-panel">
      <div id="game">
        <div id="board"></div>
        <div id="actors"></div>
      </div>
    </div>
    
    <div id="console-panel">
        <div class="panel-header">
          <span>Console interativo</span>
        </div>
      <div id="console" class="codearea" contenteditable ></div>
    </div>

    <div id="output-panel">
      <div class="panel-header" class="outputarea">
        <span>Saídas</span>
      </div>
      <div id="output-content" ></div>
    </div>

  </div>

  <data id="confs">
    {
      "bee": ["2,3,0"],
      "gs": ["3,4", "5,4", "6,4"]
    }
  </data>

  <script type="text/python">
      # Importanto tudo do main para ser repassado para o console interativo através do globals()
      from main import *

      # Start an interactive interpreter in textarea with id "console"
      Interpreter("console", globals=globals())
 </script>
</body>
</html>
