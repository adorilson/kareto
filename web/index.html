<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kareto Web</title>

  <link rel="icon" href="favicon.ico">


  <!-- Brython -->
  <script src="./vendor/brython/brython.min.js"></script>
  <script src="./vendor/brython/brython_stdlib.js"></script>


  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="./vendor/codemirror-5.48.4/doc/docs.css">
  <link rel="stylesheet" href="./vendor/codemirror-5.48.4/addon/hint/show-hint.css">
  <link rel="stylesheet" href="./vendor/codemirror-5.48.4/lib/codemirror.css">

  <link rel="stylesheet" type="text/css" href="./css/kareto.css" />

  <!-- Bootstrap -->
  <!-- TODO inverter isso com os CSS' locais, para que Bootstrap não sobrescreva
   os estilos definidos localmente -->
  <link rel="stylesheet" href="./vendor/bootstrap/bootstrap.min.css">

<style>
  .hidden{
    display: none;
  }

  .not-hidden{
    display:block;
  }

  pre {
    display: block;
    padding: 0px;
    margin: 0 2px 0px;
    font-size: 14px;
    line-height: 1;
    word-break: break-all;
    word-wrap: break-word;
    color: white;
    background-color: #000;
    border: 0px solid #ccc;
    border-radius: 0px;
  }

  .container {
    width: 100%;
  }

  .row {
    margin-left: 0px;
    margin-right: 0px;
  }

  #console pre{
    background-color: #000;
    font-family: monospace;
  }

  #turtle-canvas{
    width: 550px;
    height: 550px;
    margin-left:0px;
    border: 0px solid #000;
  }

  #turtle-div {
    width: 500px;
    height: 550px;
    top: 35px;
    left: 250px;
    position: absolute;
    border: 1px solid gray;
  }

  .CodeMirror {
    width:100%;
    height: 100%;
    border: 1px solid #ddd;
  }

  .CodeMirror-scroll {
    max-height: pxpx;
  }

  #output-content {
    background-color: black;
    color: yellow;
    font-weight: bolder;
    min-height: 50px;
    height: auto;
    max-height: 200px;
  }

  </style>

</head>

<body>


  <div id="layout" style="position: relative;">

    <div id="loading-overlay" aria-live="polite" aria-busy="true" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: rgba(0, 0, 0, 0.6); color: #fff; z-index: 9999;">
      <svg class="loading-spinner" viewBox="0 0 100 100" width="48" height="48" role="img" aria-label="Carregando" style="display: block; filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.45)); animation: spin 0.9s linear infinite; transform-origin: 50% 50%; transform-box: fill-box;">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="0.9s" repeatCount="indefinite" />
        <defs>
          <linearGradient id="spinner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
            <stop offset="60%" stop-color="#ffffff" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
          </linearGradient>
        </defs>
        <circle class="spinner-track" cx="50" cy="50" r="36" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6" />
        <circle class="spinner-arc" cx="50" cy="50" r="36" fill="none" stroke="url(#spinner-gradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="170 70" />
      </svg>
      <div class="loading-text" style="font-size: 14px; letter-spacing: 1px;">Carregando ambiente de desenvolvimento...</div>
    </div>

    <div id="editor-panel">
      <div class="panel-header" style="display:flex">
        <span style="flex-basis:50%">Editor de código</span>
        <div>
          <button id="reset-btn" class="btn btn-xs btn-danger">
            <span class="glyphicon glyphicon-repeat"></span>
            Restaurar código inicial
          </button>
          <button id="run-btn" class="btn btn-xs btn-default">
            <span class="glyphicon glyphicon-play-circle"></span>
            Executar
          </button>
          <button id="replay-scene" class="btn btn-xs btn-enabled" style="display:none">Repetir</button>
          <!--<button class="btn btn-xs" onclick="copyToClipBoard()">Copy</button>-->
        </div>
      </div>

      <textarea id="editor"></textarea>
      <textarea id="editoraux" style="display:none"></textarea>
      <!--<button id="run-btn">Executar</button>-->
    </div>

    <div id="game-panel">
      <div class="panel-header" style="display:flex;">
        <span>Area de execução</span>
        <div>
          <button id="clear" class="btn btn-xs btn-danger" style="position: relative; left: 350px;" onclick="window.reset_scene && window.reset_scene()">
            <span class="glyphicon glyphicon-repeat"></span> Recomeçar
          </button>
        </div>
      </div>
        <div id="game">
          <div id="board"></div>
          <div id="actors"></div>
        </div>
    </div>

    <div id="output-panel">
      <div class="panel-header">
        <span>Saidas</span>
      </div>
      <div id="output-content" class="outputarea"></div>
      <span id="status-info"></span>
      <!--<div id="output-content" ></div>-->
    </div>

    <div id="console-panel">
      <div class="panel-header">
        <span>Console interativo</span>
      </div>
      <div id="console" class="codearea" contenteditable></div>
    </div>

  </div>

  <data id="confs" style="display: none;">
    {
      "maia": ["1,3,0"],
      "gs": ["3,4", "1,5"],
      "cag":[1]
    }
  </data>

  <data id="code_header" style="display:none">
    # @cikey 23f33fc943d00e5799b061bdf21eb248
    # @sid 8888
    # @aid 1.1
  </data>

  <data id="init" style="display:none">

  </data>

  <data id="reset" style="display:none">

  </data>

  <data id="test-cases" style="display: none;">
    {
      "maia": ["1,3,0"],
      "gs": ["3,4", "1,5"],
      "cag":[1]
    }
  </data>

  <template>
    # Esse primeiro é o valor usado nos testes automatizados. Garanta que confs tenha esse conteudo.
    {
      "maia": ["1,3,0"],
      "gs": ["3,4", "1,5"],
      "cag":[1]
    }


    {
      "maia": ["1,4,0"],
      "gs": ["3,4,1", "4,4,1"],
      "cag":[0]
    }


    {
      "maia": ["1,3,0"],
      "gs": ["3,3", "3,5", "1,5"],
      "cag":[1]
    }
  </template>

  <script type="text/python" src="main.py"></script>

  <script type="text/javascript" src="./vendor/jquery-1.11.2.min.js"></script>
  <script type="text/javascript" src="./vendor/bootstrap-3.1.1.min.js"></script>

  <script type="text/javascript" src="./vendor/codemirror-5.48.4/lib/codemirror.js"></script>
  <script type="text/javascript" src="./vendor/codemirror-5.48.4/mode/clike/clike.js"></script>
  <script type="text/javascript" src="./vendor/codemirror-5.48.4/mode/python/python.js"></script>
  <script type="text/javascript" src="./vendor/codemirror-5.48.4/addon/selection/active-line.js"></script>
</body>
</html>
