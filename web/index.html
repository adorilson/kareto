<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kareto Web</title>

  <!-- CodeMirror 5 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

  <!-- Brython -->
  <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>


  <link rel="stylesheet" href="style.css" type="text/css" />
</head>

<body onload="brython()">

  <div id="layout">
    
    <div id="editor-panel">
      <textarea id="editor"></textarea>
      <button id="run-btn">Executar</button>
    </div>

    <div id="game-panel">
      <div id="game">
        <div id="board"></div>
        <div id="actors"></div>
      </div>
    </div>
    
    <div id="console-panel">
      <div id="console" class="codearea" contenteditable ></div>
    </div>
    <pre id="kareto-print-output">output here...</pre>
  </div>


  <script type="text/python" src="main.py"> </script>
  <script type="text/python">
      # Importanto tudo do main para ser repassado para o console interativo através do globals()
      from main import *

      # Start an interactive interpreter in textarea with id "console"
      Interpreter("console", globals=globals())
 </script>
</body>
</html>
